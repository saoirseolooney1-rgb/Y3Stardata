<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Handling Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', system-ui, sans-serif; background: #FEFDF5; color: #1A1A2E; min-height: 100dvh; }
    #root { min-height: 100dvh; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; font-weight: 800; border-radius: 16px; border: none;
      cursor: pointer; padding: 12px 24px; font-size: 18px;
      transition: transform 0.1s, filter 0.1s;
    }
    .btn:active:not(:disabled) { transform: scale(0.96); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: #FF4B8B; color: #fff; }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.07); }
    .btn-secondary { background: #fff; color: #1A1A2E; border: 2.5px solid #D8D0C0; }
    .btn-secondary:hover:not(:disabled) { background: #F5F0E8; }
    .btn-danger { background: #EF4444; color: #fff; }
    .btn-danger:hover:not(:disabled) { filter: brightness(1.08); }
    .btn-outline { background: transparent; color: #555; border: 2.5px solid #C8C0B0; }
    .btn-outline:hover:not(:disabled) { background: #F5F0E8; }
    .btn-ghost { background: transparent; border: none; color: #7A7A9A; font-size: 16px; padding: 8px 12px; }
    .btn-icon { width: 44px; height: 44px; padding: 0; border-radius: 12px; font-size: 20px; }
    .btn-lg { height: 64px; font-size: 22px; border-radius: 20px; width: 100%; justify-content: center; }

    input, select {
      font-family: inherit; font-weight: 700; font-size: 18px;
      padding: 13px 18px; border: 2.5px solid #D0C8B8; border-radius: 16px;
      background: #fff; color: #1A1A2E; outline: none; width: 100%;
    }
    input:focus, select:focus { border-color: #FF4B8B; box-shadow: 0 0 0 3px rgba(255,75,139,0.15); }

    .card { background: #fff; border: 3.5px solid #E0D8C8; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
    .card-header { background: rgba(255,75,139,0.07); padding: 24px 28px; border-bottom: 3.5px solid #E0D8C8; }
    .card-body { padding: 24px 28px; }

    .page { padding: 16px; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; padding-bottom: 48px; }
    .page-wide { max-width: 1040px; width: 100%; }
    .page-narrow { max-width: 780px; width: 100%; }
    .page-xs { max-width: 460px; width: 100%; }

    .progress { display: flex; gap: 6px; justify-content: center; align-items: center; margin-bottom: 24px; }
    .p-step { width: 48px; height: 48px; border-radius: 50%; font-size: 20px; font-weight: 900; border: 3px solid #D8D0C0; background: #fff; color: #9A9A9A; display: flex; align-items: center; justify-content: center; }
    .p-step.active { background: #FF4B8B; color: #fff; border-color: #FF4B8B; }
    .p-step.done { background: #22C55E; color: #fff; border-color: #22C55E; }
    .p-line { width: 40px; height: 3px; background: #D8D0C0; border-radius: 2px; }
    .p-line.done { background: #22C55E; }

    .success-box { background: rgba(34,197,94,0.1); border: 3.5px solid #22C55E; border-radius: 20px; padding: 24px; text-align: center; }

    table.dt { width: 100%; border-collapse: collapse; }
    table.dt th { background: #F5F0E8; padding: 12px 16px; font-weight: 900; font-size: 15px; color: #7A7A9A; text-align: left; }
    table.dt td { padding: 11px 16px; border-bottom: 1.5px solid #F0EBE0; font-weight: 700; }
    table.dt tr:last-child td { border-bottom: none; }
    table.dt tr:hover td { background: #FEFDF5; }

    table.pict { width: 100%; border-collapse: collapse; }
    table.pict th { border-bottom: 3px solid #E0D8C8; padding: 8px 12px 12px; font-weight: 900; font-size: 15px; color: #7A7A9A; text-align: left; }
    table.pict td { padding: 10px 12px; border-bottom: 1.5px solid #F0EBE0; vertical-align: middle; }
    table.pict tr:last-child td { border-bottom: none; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.48); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .dialog { background: #fff; border-radius: 20px; padding: 32px; max-width: 420px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }

    .overflow-x { overflow-x: auto; }

    @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .anim-in { animation: zoomIn 0.35s ease-out; }

    @media (max-width: 600px) {
      .card-header, .card-body { padding: 18px 16px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── CONSTANTS ─────────────────────────────────────── */
    const CLASSES        = ['Amber', 'Pearl', 'Sapphire', 'Emerald', 'Topaz'];
    const KEY_OPTIONS    = [{ symbol: '⭐', value: 1 }, { symbol: '🍎', value: 2 }, { symbol: '❤️', value: 5 }];
    const BAR_COLORS     = ['#FF4B8B', '#3B9EFF', '#22C55E', '#FF8C00', '#9B59B6'];
    const TEACHER_PASS   = 'Team3!';
    const STORE_KEY      = 'dc-sessions-v1';

    /* ── STORAGE ───────────────────────────────────────── */
    function loadSessions() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch { return []; }
    }
    function persistSessions(arr) {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(arr)); } catch {}
    }
    function createSession(data) {
      const sessions = loadSessions();
      const session = { ...data, id: Date.now() };
      sessions.push(session);
      persistSessions(sessions);
      return session;
    }
    function patchSession(id, updates) {
      const sessions = loadSessions();
      const i = sessions.findIndex(s => s.id === id);
      if (i !== -1) { sessions[i] = { ...sessions[i], ...updates }; persistSessions(sessions); }
    }
    function getSession(id) { return loadSessions().find(s => s.id === id) || null; }
    function deleteAll() { try { localStorage.removeItem(STORE_KEY); } catch {} }

    /* ── UTILITIES ─────────────────────────────────────── */
    function chartScale(maxVal) {
      const raw  = Math.max(maxVal, 1);
      const step = raw <= 9 ? 1 : raw <= 19 ? 2 : raw <= 49 ? 5 : 10;
      return { yAxisMax: Math.ceil((raw + 0.5) / step) * step, step };
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }
    function exportCSV(sessions) {
      const hdr = ['Name','Class','Survey Title','Completed','Time (s)','Step 1','Step 2','Step 3'];
      const rows = sessions.map(s => [
        s.firstName, s.studentClass, s.surveyTitle || '',
        s.completedAt ? new Date(s.completedAt).toLocaleString('en-GB') : 'Incomplete',
        s.timeTakenSeconds || '',
        s.step1Completed ? 'Yes' : 'No', s.step2Completed ? 'Yes' : 'No', s.step3Completed ? 'Yes' : 'No'
      ]);
      const csv = [hdr, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
      a.download = 'data-challenge-results.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    /* ── SHARED COMPONENTS ─────────────────────────────── */

    function Progress({ current }) {
      return (
        <div className="progress">
          {[1,2,3].map((s, i) => (
            <React.Fragment key={s}>
              {i > 0 && <div className={`p-line${current > i ? ' done' : ''}`} />}
              <div className={`p-step${current === s ? ' active' : current > s ? ' done' : ''}`}>
                {current > s ? '✓' : s}
              </div>
            </React.Fragment>
          ))}
        </div>
      );
    }

    function HalfSymbol({ symbol, size = 30 }) {
      return (
        <span style={{
          display: 'inline-block', fontSize: size, lineHeight: 1,
          clipPath: 'polygon(0 0, 50% 0, 50% 100%, 0 100%)',
          width: `${size * 0.52}px`, overflow: 'hidden',
        }}>{symbol}</span>
      );
    }

    /* ── DRAGGABLE BAR ─────────────────────────────────── */
    function DraggableBar({ value, label, color, yAxisMax, onChange }) {
      const ref = useRef(null);
      const dragging = useRef(false);

      const snap = (clientY) => {
        if (!ref.current) return;
        const rect = ref.current.getBoundingClientRect();
        const frac = Math.max(0, Math.min(1, (rect.bottom - clientY) / rect.height));
        onChange(Math.min(Math.round(frac * yAxisMax), yAxisMax));
      };

      return (
        <div style={{ flex: 1, height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', position: 'relative', minWidth: 0 }}>
          <div style={{ position: 'absolute', top: -30, fontWeight: 900, fontSize: 18, color: '#1A1A2E', zIndex: 20 }}>{value}</div>
          <div
            ref={ref}
            style={{ width: '78%', height: '100%', display: 'flex', alignItems: 'flex-end', cursor: 'ns-resize', touchAction: 'none', position: 'relative', zIndex: 10 }}
            onPointerDown={e => { dragging.current = true; e.currentTarget.setPointerCapture(e.pointerId); snap(e.clientY); }}
            onPointerMove={e => { if (dragging.current) snap(e.clientY); }}
            onPointerUp={e => { dragging.current = false; e.currentTarget.releasePointerCapture(e.pointerId); }}
            onPointerCancel={e => { dragging.current = false; }}
          >
            <div style={{ position: 'absolute', inset: 0, zIndex: 10 }} />
            <div style={{
              width: '100%', height: `${Math.max(0, (value / yAxisMax) * 100)}%`,
              background: color, borderRadius: '10px 10px 0 0',
              boxShadow: 'inset 0 4px 0 rgba(255,255,255,0.3)',
              border: '2px solid rgba(0,0,0,0.08)', borderBottom: 'none',
              transition: 'height 0.06s linear', position: 'relative', zIndex: 0,
            }} />
          </div>
          <div style={{ position: 'absolute', bottom: -36, fontWeight: 700, fontSize: 13, textAlign: 'center', width: 80, left: '50%', transform: 'translateX(-50%)', lineHeight: 1.3 }}>{label}</div>
        </div>
      );
    }

    /* read-only bar chart for teacher view */
    function BarChartView({ barChart, yAxisMax, step }) {
      const gridVals = [];
      for (let v = 0; v <= yAxisMax; v += step) gridVals.push(v);
      return (
        <div style={{ position: 'relative', height: 260, marginLeft: 48, marginRight: 16, marginBottom: 48, marginTop: 32 }}>
          {gridVals.map(v => {
            const top = `${((yAxisMax - v) / yAxisMax) * 100}%`;
            return (
              <div key={v} style={{ position: 'absolute', top, left: 0, right: 0, zIndex: 1, pointerEvents: 'none' }}>
                <span style={{ position: 'absolute', right: '100%', paddingRight: 6, transform: 'translateY(-50%)', fontWeight: 700, fontSize: 13, color: '#7A7A9A', whiteSpace: 'nowrap' }}>{v}</span>
                <div style={{ borderTop: v === 0 ? '3px solid #C0B8A8' : '1.5px solid #DDD8C8', width: '100%', position: 'absolute' }} />
              </div>
            );
          })}
          <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, borderLeft: '3px solid #C0B8A8' }} />
          <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'flex-end', gap: 8, padding: '0 8px' }}>
            {barChart.map((bar, i) => (
              <div key={i} style={{ flex: 1, height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', position: 'relative', minWidth: 0 }}>
                <div style={{ position: 'absolute', top: -24, fontWeight: 900, fontSize: 15 }}>{bar.value}</div>
                <div style={{ width: '78%', height: '100%', display: 'flex', alignItems: 'flex-end' }}>
                  <div style={{ width: '100%', height: `${Math.max(0, (bar.value / yAxisMax) * 100)}%`, background: BAR_COLORS[i % BAR_COLORS.length], borderRadius: '8px 8px 0 0', border: '2px solid rgba(0,0,0,0.08)', borderBottom: 'none' }} />
                </div>
                <div style={{ position: 'absolute', bottom: -30, fontWeight: 700, fontSize: 12, textAlign: 'center', width: 72, left: '50%', transform: 'translateX(-50%)' }}>{bar.category}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* read-only pictogram for teacher view */
    function PictogramView({ pictogram, pictogramKey }) {
      const sym = pictogramKey === 1 ? '⭐' : pictogramKey === 2 ? '🍎' : '❤️';
      return (
        <table className="pict" style={{ minWidth: 320 }}>
          <thead><tr><th style={{ width: 160 }}>Category</th><th>Pictures</th></tr></thead>
          <tbody>
            {pictogram.map((row, i) => (
              <tr key={i}>
                <td style={{ fontWeight: 800, fontSize: 18 }}>{row.category}</td>
                <td>
                  <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 2 }}>
                    {Array.from({ length: row.count }).map((_, j) => <span key={j} style={{ fontSize: 28, lineHeight: 1 }}>{sym}</span>)}
                    {row.hasHalf && <HalfSymbol symbol={sym} size={28} />}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      );
    }

    /* ── HOME PAGE ─────────────────────────────────────── */
    function HomePage({ onStart, onTeacher }) {
      const [firstName, setFirstName] = useState('');
      const [cls, setCls] = useState('');

      const go = () => {
        if (!firstName.trim() || !cls) return;
        onStart({ firstName: firstName.trim(), studentClass: cls, startedAt: new Date().toISOString() });
      };

      return (
        <div className="page" style={{ justifyContent: 'center' }}>
          <div className="page-xs">
            <div style={{ textAlign: 'center', marginBottom: 32 }}>
              <h1 style={{ fontSize: 'clamp(36px, 8vw, 56px)', fontWeight: 900, color: '#FF4B8B', lineHeight: 1.1, marginBottom: 12 }}>Data Handling<br/>Challenge</h1>
              <p style={{ fontSize: 22, fontWeight: 800, color: '#FFB800' }}>Ready to become a Data Expert?</p>
            </div>
            <div className="card">
              <div className="card-body" style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
                <div>
                  <label style={{ display: 'block', fontWeight: 900, fontSize: 20, marginBottom: 8 }}>What is your first name?</label>
                  <input type="text" value={firstName} onChange={e => setFirstName(e.target.value)} placeholder="e.g. Sam" onKeyDown={e => e.key === 'Enter' && go()} autoFocus />
                </div>
                <div>
                  <label style={{ display: 'block', fontWeight: 900, fontSize: 20, marginBottom: 8 }}>Which class are you in?</label>
                  <select value={cls} onChange={e => setCls(e.target.value)}>
                    <option value="">Choose your class</option>
                    {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <button className="btn btn-primary btn-lg" onClick={go} disabled={!firstName.trim() || !cls} style={{ marginTop: 8 }}>Start Challenge!</button>
              </div>
            </div>
            <div style={{ textAlign: 'center', marginTop: 32 }}>
              <button className="btn btn-ghost" onClick={onTeacher}>Teacher Dashboard</button>
            </div>
          </div>
        </div>
      );
    }

    /* ── STEP 1 ────────────────────────────────────────── */
    function Step1Page({ session, onNext }) {
      const [surveyTitle, setSurveyTitle] = useState('');
      const [rows, setRows] = useState(Array(5).fill(null).map(() => ({ category: '', number: 0 })));

      const setCategory = (i, v) => { const r = [...rows]; r[i] = { ...r[i], category: v }; setRows(r); };
      const setNumber   = (i, v) => { const n = parseInt(v, 10); const r = [...rows]; r[i] = { ...r[i], number: isNaN(n) || n < 0 ? 0 : n }; setRows(r); };
      const addRow      = () => setRows([...rows, { category: '', number: 0 }]);
      const delRow      = (i) => setRows(rows.filter((_, idx) => idx !== i));

      const validRows = rows.filter(r => r.category.trim() && r.number > 0);
      const total     = rows.reduce((s, r) => s + (r.number || 0), 0);

      const handleNext = () => {
        if (!validRows.length) return;
        const saved = createSession({
          ...session, surveyTitle: surveyTitle.trim() || null, dataTable: validRows,
          barChart: [], barChartCorrect: null, pictogram: [], pictogramKey: null, pictogramCorrect: null,
          step1Completed: true, step2Completed: false, step3Completed: false, completedAt: null, timeTakenSeconds: null,
        });
        onNext({ ...session, id: saved.id, surveyTitle: surveyTitle.trim() || null, dataTable: validRows });
      };

      return (
        <div className="page">
          <div className="page-narrow">
            <Progress current={1} />
            <div className="card">
              <div className="card-header">
                <h2 style={{ fontSize: 28, fontWeight: 900, color: '#FF4B8B', marginBottom: 8 }}>Step 1: Collect Data</h2>
                <p style={{ fontSize: 18, fontWeight: 700 }}>Ask your classmates a question (for example: favourite fruit, favourite pet or favourite colour). Record your results in the table below.</p>
              </div>
              <div className="card-body" style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

                {/* Survey title */}
                <div>
                  <label style={{ display: 'block', fontWeight: 900, fontSize: 19, marginBottom: 8 }}>Title of your survey</label>
                  <input type="text" value={surveyTitle} onChange={e => setSurveyTitle(e.target.value)} placeholder="e.g. Favourite Fruit" />
                </div>

                {/* Data table */}
                <div>
                  <div style={{ display: 'flex', fontWeight: 900, fontSize: 15, color: '#7A7A9A', paddingBottom: 8, borderBottom: '2.5px solid #E0D8C8', marginBottom: 8 }}>
                    <span style={{ flex: 1 }}>Category</span>
                    <span style={{ width: 100, textAlign: 'center' }}>Number</span>
                    <span style={{ width: 48 }}></span>
                  </div>
                  {rows.map((row, i) => (
                    <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 8 }}>
                      <input type="text" value={row.category} onChange={e => setCategory(i, e.target.value)} placeholder="Type here…" style={{ flex: 1 }} />
                      <input type="number" min="0" value={row.number || ''} onChange={e => setNumber(i, e.target.value)} style={{ width: 100, textAlign: 'center' }} />
                      <button className="btn btn-danger btn-icon" onClick={() => delRow(i)} disabled={rows.length <= 1} style={{ flexShrink: 0 }}>✕</button>
                    </div>
                  ))}
                </div>

                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 8, borderTop: '2px solid #E0D8C8' }}>
                  <button className="btn btn-secondary" onClick={addRow} style={{ height: 44 }}>+ Add Row</button>
                  <div style={{ fontWeight: 900, fontSize: 22, color: '#FF4B8B' }}>Total: {total}</div>
                </div>

                <button className="btn btn-primary btn-lg" onClick={handleNext} disabled={!validRows.length} style={{ marginTop: 8 }}>Next Step →</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── STEP 2 ────────────────────────────────────────── */
    function Step2Page({ session, onNext }) {
      const { dataTable } = session;
      const [bars, setBars] = useState(dataTable.map(r => ({ category: r.category, value: 0 })));
      const [correct, setCorrect] = useState(false);

      const maxExpected = Math.max(...dataTable.map(r => r.number), 1);
      const { yAxisMax, step } = chartScale(maxExpected);
      const gridVals = [];
      for (let v = 0; v <= yAxisMax; v += step) gridVals.push(v);

      const check = (b) => setCorrect(b.every((bar, i) => bar.value === dataTable[i].number));
      const setBar = (i, val) => { const b = [...bars]; b[i] = { ...b[i], value: Math.max(0, val) }; setBars(b); check(b); };
      const reset  = () => { const b = bars.map(bar => ({ ...bar, value: 0 })); setBars(b); setCorrect(false); };

      const handleNext = () => {
        patchSession(session.id, { barChart: bars, barChartCorrect: true, step2Completed: true });
        onNext({ ...session, barChart: bars });
      };

      return (
        <div className="page">
          <div className="page-narrow" style={{ maxWidth: 860 }}>
            <Progress current={2} />
            <div className="card">
              <div className="card-header">
                <h2 style={{ fontSize: 28, fontWeight: 900, color: '#FF4B8B', marginBottom: 8 }}>Step 2: Create a Bar Chart</h2>
                <p style={{ fontSize: 18, fontWeight: 700 }}>Drag the bars up to match the numbers from your table!</p>
              </div>
              <div className="card-body" style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
                  <div style={{ background: '#F5F0E8', padding: 16, borderRadius: 16, border: '2px solid #E0D8C8', minWidth: 170 }}>
                    <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 8 }}>Your Data:</div>
                    {dataTable.map((r, i) => (
                      <div key={i} style={{ display: 'flex', justifyContent: 'space-between', gap: 16, fontSize: 17, fontWeight: 700 }}>
                        <span>{r.category}:</span><span style={{ fontWeight: 900 }}>{r.number}</span>
                      </div>
                    ))}
                  </div>
                  <button className="btn btn-outline" onClick={reset}>Reset Bars</button>
                </div>

                {session.surveyTitle && <div style={{ textAlign: 'center', fontWeight: 900, fontSize: 22 }}>{session.surveyTitle}</div>}

                {/* CHART */}
                <div style={{ position: 'relative', height: 360, marginLeft: 52, marginRight: 16, marginBottom: 52, marginTop: 36 }}>
                  {gridVals.map(v => {
                    const top = `${((yAxisMax - v) / yAxisMax) * 100}%`;
                    return (
                      <div key={v} style={{ position: 'absolute', top, left: 0, right: 0, zIndex: 1, pointerEvents: 'none' }}>
                        <span style={{ position: 'absolute', right: '100%', paddingRight: 8, transform: 'translateY(-50%)', fontWeight: 700, fontSize: 13, color: '#7A7A9A', whiteSpace: 'nowrap' }}>{v}</span>
                        <div style={{ borderTop: v === 0 ? '3px solid #C0B8A8' : '1.5px solid #D8D0C0', width: '100%', position: 'absolute' }} />
                      </div>
                    );
                  })}
                  <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, borderLeft: '3px solid #C0B8A8' }} />
                  <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'flex-end', gap: 8, padding: '0 8px', zIndex: 5 }}>
                    {bars.map((bar, i) => (
                      <DraggableBar key={i} value={bar.value} label={bar.category} color={BAR_COLORS[i % BAR_COLORS.length]} yAxisMax={yAxisMax} onChange={val => setBar(i, val)} />
                    ))}
                  </div>
                </div>

                {correct && (
                  <div className="success-box anim-in">
                    <div style={{ fontSize: 26, fontWeight: 900 }}>⭐ Great job! Your bar chart is correct! ⭐</div>
                  </div>
                )}

                <button className="btn btn-primary btn-lg" onClick={handleNext} disabled={!correct}>Next Step →</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── STEP 3 ────────────────────────────────────────── */
    function Step3Page({ session, onFinish }) {
      const { dataTable } = session;
      const [selKey, setSelKey] = useState(null);
      const [wholes, setWholes] = useState(dataTable.reduce((a, r) => ({ ...a, [r.category]: 0 }), {}));
      const [halves, setHalves] = useState(dataTable.reduce((a, r) => ({ ...a, [r.category]: false }), {}));

      const selectKey = (opt) => {
        setSelKey(opt);
        setWholes(dataTable.reduce((a, r) => ({ ...a, [r.category]: 0 }), {}));
        setHalves(dataTable.reduce((a, r) => ({ ...a, [r.category]: false }), {}));
      };

      const rowVal = (cat) => !selKey ? 0 : (wholes[cat] || 0) * selKey.value + (halves[cat] ? selKey.value / 2 : 0);
      const correct = selKey !== null && dataTable.every(r => Math.abs(rowVal(r.category) - r.number) < 0.001);

      const handleFinish = () => {
        if (!correct || !selKey) return;
        const pictogram = dataTable.map(r => ({ category: r.category, count: wholes[r.category] || 0, keyValue: selKey.value, hasHalf: halves[r.category] || false }));
        const end = new Date();
        const secs = Math.round((end - new Date(session.startedAt)) / 1000);
        patchSession(session.id, { pictogram, pictogramKey: selKey.value, pictogramCorrect: true, step3Completed: true, completedAt: end.toISOString(), timeTakenSeconds: secs });
        onFinish();
      };

      return (
        <div className="page">
          <div className="page-narrow" style={{ maxWidth: 860 }}>
            <Progress current={3} />
            <div className="card">
              <div className="card-header">
                <h2 style={{ fontSize: 28, fontWeight: 900, color: '#FF4B8B', marginBottom: 8 }}>Step 3: Create a Pictogram</h2>
                <p style={{ fontSize: 18, fontWeight: 700 }}>Choose a picture key, then add pictures to show your data.</p>
              </div>
              <div className="card-body" style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>

                {/* Key selector */}
                <div>
                  <div style={{ fontWeight: 900, fontSize: 22, textAlign: 'center', marginBottom: 16 }}>1. Choose your Key</div>
                  <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
                    {KEY_OPTIONS.map(opt => (
                      <button key={opt.value} onClick={() => selectKey(opt)} style={{
                        padding: '12px 20px', border: `3.5px solid ${selKey?.value === opt.value ? '#FF4B8B' : '#E0D8C8'}`,
                        borderRadius: 16, background: selKey?.value === opt.value ? 'rgba(255,75,139,0.08)' : '#fff',
                        fontFamily: 'inherit', fontWeight: 800, fontSize: 20, cursor: 'pointer',
                        display: 'flex', alignItems: 'center', gap: 10, transition: 'all 0.12s',
                      }}>
                        <span style={{ fontSize: 38 }}>{opt.symbol}</span> = {opt.value}
                      </button>
                    ))}
                  </div>
                </div>

                {selKey && (
                  <div style={{ borderTop: '3px solid #E0D8C8', paddingTop: 20, display: 'flex', flexDirection: 'column', gap: 16 }}>
                    {/* Key reminder */}
                    <div style={{ background: '#F5F0E8', padding: '12px 16px', borderRadius: 12, border: '2px solid #E0D8C8', fontWeight: 800, fontSize: 18, display: 'inline-flex', alignItems: 'center', gap: 8 }}>
                      Key: <span style={{ fontSize: 26 }}>{selKey.symbol}</span> = {selKey.value}
                      {selKey.value > 1 && (
                        <span style={{ marginLeft: 12, color: '#7A7A9A', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                          <HalfSymbol symbol={selKey.symbol} size={26} /> = {selKey.value / 2}
                        </span>
                      )}
                    </div>

                    {session.surveyTitle && <div style={{ textAlign: 'center', fontWeight: 900, fontSize: 22 }}>{session.surveyTitle}</div>}

                    {/* Pictogram table */}
                    <div className="overflow-x">
                      <table className="pict" style={{ minWidth: 460 }}>
                        <thead>
                          <tr>
                            <th style={{ width: 160 }}>Category</th>
                            <th>Pictures</th>
                            <th style={{ width: 170, textAlign: 'right' }}>Controls</th>
                          </tr>
                        </thead>
                        <tbody>
                          {dataTable.map((row, i) => {
                            const count   = wholes[row.category] || 0;
                            const hasHalf = halves[row.category] || false;
                            const rv      = rowVal(row.category);
                            const rowOk   = Math.abs(rv - row.number) < 0.001;
                            return (
                              <tr key={i}>
                                <td>
                                  <div style={{ fontWeight: 800, fontSize: 18 }}>{row.category}</div>
                                  <div style={{ fontSize: 13, color: '#7A7A9A', fontWeight: 700 }}>Target: {row.number}</div>
                                </td>
                                <td>
                                  <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 2, minHeight: 40 }}>
                                    {Array.from({ length: count }).map((_, j) => <span key={j} style={{ fontSize: 30, lineHeight: 1 }}>{selKey.symbol}</span>)}
                                    {hasHalf && <HalfSymbol symbol={selKey.symbol} size={30} />}
                                    {rowOk && <span style={{ marginLeft: 8, fontSize: 20 }}>✅</span>}
                                  </div>
                                </td>
                                <td>
                                  <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end', alignItems: 'center' }}>
                                    <button className="btn btn-secondary btn-icon"
                                      onClick={() => setWholes(p => ({ ...p, [row.category]: Math.max(0, (p[row.category] || 0) - 1) }))}
                                      disabled={count === 0}>−</button>
                                    <span style={{ fontWeight: 900, fontSize: 20, width: 28, textAlign: 'center' }}>{count}</span>
                                    <button className="btn btn-secondary btn-icon"
                                      onClick={() => setWholes(p => ({ ...p, [row.category]: (p[row.category] || 0) + 1 }))}>+</button>
                                    {selKey.value > 1 && (
                                      <button
                                        style={{
                                          width: 44, height: 44, borderRadius: 12, border: '2.5px solid', fontFamily: 'inherit', fontWeight: 900,
                                          fontSize: 17, cursor: 'pointer',
                                          background: hasHalf ? '#FF4B8B' : '#fff',
                                          color: hasHalf ? '#fff' : '#1A1A2E',
                                          borderColor: hasHalf ? '#FF4B8B' : '#D8D0C0',
                                        }}
                                        onClick={() => setHalves(p => ({ ...p, [row.category]: !p[row.category] }))}
                                        title="Toggle half symbol"
                                      >½</button>
                                    )}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {correct && (
                  <div className="success-box anim-in">
                    <div style={{ fontSize: 24, fontWeight: 900 }}>🎉 Amazing! You have completed your pictogram! 🎉</div>
                  </div>
                )}

                {selKey && (
                  <button className="btn btn-primary btn-lg" onClick={handleFinish} disabled={!correct}>Finish Challenge!</button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── COMPLETION ────────────────────────────────────── */
    function CompletionPage({ onDone }) {
      return (
        <div className="page" style={{ justifyContent: 'center' }}>
          <div style={{ textAlign: 'center', padding: 32, maxWidth: 520 }}>
            <div style={{ fontSize: 80, marginBottom: 24 }}>🎉</div>
            <h1 style={{ fontSize: 44, fontWeight: 900, color: '#FF4B8B', marginBottom: 16 }}>Well done!</h1>
            <p style={{ fontSize: 22, fontWeight: 700, marginBottom: 36 }}>You have completed all three steps of the Data Handling Challenge!</p>
            <button className="btn btn-primary" onClick={onDone} style={{ height: 56, fontSize: 20, paddingLeft: 48, paddingRight: 48, borderRadius: 18 }}>Start Again</button>
          </div>
        </div>
      );
    }

    /* ── TEACHER LOGIN ─────────────────────────────────── */
    function TeacherLogin({ onSuccess, onBack }) {
      const [pw, setPw]   = useState('');
      const [err, setErr] = useState(false);

      const submit = (e) => {
        e.preventDefault();
        if (pw === TEACHER_PASS) { onSuccess(); }
        else { setErr(true); setPw(''); }
      };

      return (
        <div className="page" style={{ justifyContent: 'center' }}>
          <div className="page-xs">
            <div className="card">
              <div className="card-body" style={{ display: 'flex', flexDirection: 'column', gap: 20, alignItems: 'center' }}>
                <div style={{ fontSize: 56 }}>🔒</div>
                <h1 style={{ fontSize: 30, fontWeight: 900, textAlign: 'center' }}>Teacher Access</h1>
                <p style={{ fontSize: 17, fontWeight: 700, color: '#7A7A9A', textAlign: 'center' }}>Please enter the teacher password to continue.</p>
                <form onSubmit={submit} style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <div>
                    <label style={{ display: 'block', fontWeight: 900, fontSize: 18, marginBottom: 8 }}>Password</label>
                    <input type="password" value={pw} onChange={e => { setPw(e.target.value); setErr(false); }} placeholder="Enter password" autoFocus />
                    {err && <p style={{ color: '#EF4444', fontWeight: 700, marginTop: 8, fontSize: 16 }}>Incorrect password. Please try again.</p>}
                  </div>
                  <button type="submit" className="btn btn-primary btn-lg">Open Dashboard</button>
                </form>
                <button className="btn btn-ghost" onClick={onBack}>← Back to Home</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── TEACHER DASHBOARD ─────────────────────────────── */
    function TeacherDashboard({ onBack, onView }) {
      const [sessions, setSessions] = useState(loadSessions);
      const [search, setSearch]     = useState('');
      const [cls, setCls]           = useState('');
      const [confirm, setConfirm]   = useState(false);

      const filtered = sessions.filter(s =>
        (!search || s.firstName.toLowerCase().includes(search.toLowerCase())) &&
        (!cls || s.studentClass === cls)
      );

      const handleDelete = () => { deleteAll(); setSessions([]); setConfirm(false); };

      return (
        <div className="page">
          <div className="page-wide">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16, marginBottom: 24, flexWrap: 'wrap' }}>
              <div>
                <h1 style={{ fontSize: 36, fontWeight: 900 }}>Teacher Dashboard</h1>
                <p style={{ fontSize: 18, fontWeight: 700, color: '#7A7A9A' }}>View all student results</p>
              </div>
              <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                <button className="btn btn-outline" onClick={onBack}>← Home</button>
                <button className="btn btn-secondary" onClick={() => exportCSV(sessions)} disabled={!sessions.length}>Download CSV</button>
                <button className="btn btn-danger" onClick={() => setConfirm(true)} disabled={!sessions.length}>Delete All</button>
              </div>
            </div>

            <div style={{ background: '#fff', border: '3.5px solid #E0D8C8', borderRadius: 20, padding: 20 }}>
              <div style={{ display: 'flex', gap: 12, marginBottom: 16, flexWrap: 'wrap' }}>
                <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name…" style={{ maxWidth: 260, fontSize: 16 }} />
                <select value={cls} onChange={e => setCls(e.target.value)} style={{ width: 180, fontSize: 16 }}>
                  <option value="">All Classes</option>
                  {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>

              <div className="overflow-x">
                <table className="dt" style={{ minWidth: 700 }}>
                  <thead>
                    <tr>
                      <th>Name</th><th>Class</th><th>Survey</th><th>Completed</th>
                      <th style={{ textAlign: 'center' }}>Step 1</th>
                      <th style={{ textAlign: 'center' }}>Step 2</th>
                      <th style={{ textAlign: 'center' }}>Step 3</th>
                      <th style={{ textAlign: 'right' }}>Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.length === 0 ? (
                      <tr><td colSpan={8} style={{ textAlign: 'center', padding: 32, color: '#7A7A9A', fontWeight: 700, fontSize: 18 }}>No results found</td></tr>
                    ) : filtered.map(s => (
                      <tr key={s.id}>
                        <td style={{ fontSize: 17 }}>{s.firstName}</td>
                        <td>{s.studentClass}</td>
                        <td style={{ color: '#7A7A9A', fontSize: 14 }}>{s.surveyTitle || '—'}</td>
                        <td style={{ fontSize: 14 }}>{fmtDate(s.completedAt)}</td>
                        <td style={{ textAlign: 'center', fontSize: 22 }}>{s.step1Completed ? '✅' : '❌'}</td>
                        <td style={{ textAlign: 'center', fontSize: 22 }}>{s.step2Completed ? '✅' : '❌'}</td>
                        <td style={{ textAlign: 'center', fontSize: 22 }}>{s.step3Completed ? '✅' : '❌'}</td>
                        <td style={{ textAlign: 'right' }}>
                          <button className="btn btn-secondary" style={{ height: 36, fontSize: 14, borderRadius: 10, padding: '4px 16px' }} onClick={() => onView(s.id)}>View Work</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {confirm && (
              <div className="overlay">
                <div className="dialog">
                  <h2 style={{ fontWeight: 900, fontSize: 22, marginBottom: 12 }}>Delete all results?</h2>
                  <p style={{ fontWeight: 700, color: '#7A7A9A', marginBottom: 24 }}>This cannot be undone. All student sessions will be permanently deleted.</p>
                  <div style={{ display: 'flex', gap: 12, justifyContent: 'flex-end' }}>
                    <button className="btn btn-outline" onClick={() => setConfirm(false)}>Cancel</button>
                    <button className="btn btn-danger" onClick={handleDelete}>Yes, delete everything</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ── TEACHER SESSION VIEW ──────────────────────────── */
    function TeacherSessionView({ sessionId, onBack }) {
      const [s] = useState(() => getSession(sessionId));

      if (!s) return (
        <div className="page" style={{ justifyContent: 'center' }}>
          <div style={{ textAlign: 'center' }}>
            <p style={{ fontSize: 20, fontWeight: 700, marginBottom: 16 }}>Session not found.</p>
            <button className="btn btn-outline" onClick={onBack}>← Back</button>
          </div>
        </div>
      );

      const maxBar = Math.max(...(s.barChart?.map(b => b.value) || [1]), 1);
      const { yAxisMax, step } = chartScale(maxBar);
      const sym = s.pictogramKey === 1 ? '⭐' : s.pictogramKey === 2 ? '🍎' : '❤️';

      return (
        <div className="page">
          <div className="page-narrow" style={{ maxWidth: 860 }}>
            <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginBottom: 24 }}>
              <button className="btn btn-outline" onClick={onBack}>← Back</button>
              <h1 style={{ fontSize: 28, fontWeight: 900 }}>Student Work Review</h1>
            </div>

            <div className="card">
              <div style={{ background: '#F5F0E8', padding: 24, borderBottom: '3.5px solid #E0D8C8', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: 16 }}>
                {[['Student', s.firstName], ['Class', s.studentClass], ['Time Taken', s.timeTakenSeconds ? `${s.timeTakenSeconds}s` : 'N/A'], ['Date', s.completedAt ? new Date(s.completedAt).toLocaleDateString('en-GB') : 'Incomplete']].map(([lbl, val]) => (
                  <div key={lbl}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: '#7A7A9A', textTransform: 'uppercase', marginBottom: 4 }}>{lbl}</div>
                    <div style={{ fontSize: 22, fontWeight: 900 }}>{val}</div>
                  </div>
                ))}
              </div>

              <div className="card-body" style={{ display: 'flex', flexDirection: 'column', gap: 32 }}>

                {/* Step 1 */}
                <section>
                  <h2 style={{ fontWeight: 900, fontSize: 22, marginBottom: 12 }}>Step 1: Data Table {s.step1Completed ? '✅' : '❌'}</h2>
                  {s.surveyTitle && <p style={{ fontWeight: 900, fontSize: 20, marginBottom: 10 }}>{s.surveyTitle}</p>}
                  {s.dataTable?.length > 0 ? (
                    <div style={{ background: '#fff', border: '2px solid #E0D8C8', borderRadius: 16, overflow: 'hidden', maxWidth: 460 }}>
                      <div style={{ display: 'flex', background: '#F5F0E8', padding: '11px 16px', fontWeight: 900, fontSize: 15, color: '#7A7A9A', borderBottom: '2px solid #E0D8C8' }}>
                        <span style={{ flex: 1 }}>Category</span><span style={{ width: 100, textAlign: 'center' }}>Number</span>
                      </div>
                      {s.dataTable.map((row, i) => (
                        <div key={i} style={{ display: 'flex', padding: '12px 16px', borderBottom: '1.5px solid #F0EBE0', fontWeight: 700, fontSize: 18 }}>
                          <span style={{ flex: 1 }}>{row.category}</span>
                          <span style={{ width: 100, textAlign: 'center' }}>{row.number}</span>
                        </div>
                      ))}
                    </div>
                  ) : <p style={{ color: '#7A7A9A', fontWeight: 700 }}>No data saved.</p>}
                </section>

                <div style={{ borderTop: '3px solid #E0D8C8' }} />

                {/* Step 2 */}
                <section>
                  <h2 style={{ fontWeight: 900, fontSize: 22, marginBottom: 12 }}>Step 2: Bar Chart {s.barChartCorrect ? '✅' : '❌'}</h2>
                  {s.surveyTitle && <p style={{ fontWeight: 900, fontSize: 20, marginBottom: 10 }}>{s.surveyTitle}</p>}
                  {s.barChart?.length > 0
                    ? <BarChartView barChart={s.barChart} yAxisMax={yAxisMax} step={step} />
                    : <p style={{ color: '#7A7A9A', fontWeight: 700 }}>No bar chart saved.</p>}
                </section>

                <div style={{ borderTop: '3px solid #E0D8C8', marginTop: 48 }} />

                {/* Step 3 */}
                <section style={{ paddingTop: 8 }}>
                  <h2 style={{ fontWeight: 900, fontSize: 22, marginBottom: 12 }}>Step 3: Pictogram {s.pictogramCorrect ? '✅' : '❌'}</h2>
                  {s.surveyTitle && <p style={{ fontWeight: 900, fontSize: 20, marginBottom: 10 }}>{s.surveyTitle}</p>}
                  {s.pictogram?.length > 0 ? (
                    <div>
                      <div style={{ background: '#F5F0E8', padding: '12px 16px', borderRadius: 12, border: '2px solid #E0D8C8', fontWeight: 800, fontSize: 17, display: 'inline-flex', alignItems: 'center', gap: 8, marginBottom: 16 }}>
                        Key: <span style={{ fontSize: 24 }}>{sym}</span> = {s.pictogramKey}
                        {s.pictogramKey > 1 && (
                          <span style={{ marginLeft: 8, color: '#7A7A9A', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                            <HalfSymbol symbol={sym} size={24} /> = {s.pictogramKey / 2}
                          </span>
                        )}
                      </div>
                      <div className="overflow-x">
                        <PictogramView pictogram={s.pictogram} pictogramKey={s.pictogramKey} />
                      </div>
                    </div>
                  ) : <p style={{ color: '#7A7A9A', fontWeight: 700 }}>No pictogram saved.</p>}
                </section>

              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── APP (ROUTER) ──────────────────────────────────── */
    function App() {
      const [page, setPage]       = useState('home');
      const [session, setSession] = useState(null);
      const [teacherOk, setTeacherOk] = useState(false);
      const [viewId, setViewId]   = useState(null);

      return (
        page === 'home'           ? <HomePage onStart={s => { setSession(s); setPage('step1'); }} onTeacher={() => setPage(teacherOk ? 'teacher' : 'teacher-login')} />
        : page === 'step1'        ? <Step1Page session={session} onNext={s => { setSession(s); setPage('step2'); }} />
        : page === 'step2'        ? <Step2Page session={session} onNext={s => { setSession(s); setPage('step3'); }} />
        : page === 'step3'        ? <Step3Page session={session} onFinish={() => setPage('completion')} />
        : page === 'completion'   ? <CompletionPage onDone={() => { setSession(null); setPage('home'); }} />
        : page === 'teacher-login'? <TeacherLogin onSuccess={() => { setTeacherOk(true); setPage('teacher'); }} onBack={() => setPage('home')} />
        : page === 'teacher'      ? <TeacherDashboard onBack={() => setPage('home')} onView={id => { setViewId(id); setPage('teacher-session'); }} />
        : page === 'teacher-session' ? <TeacherSessionView sessionId={viewId} onBack={() => setPage('teacher')} />
        : null
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
